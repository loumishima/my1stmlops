name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

env:
  PROJECT_ID: ${{ vars.PROJECT_ID}}
  REGION: ${{ vars.REGION }}
  REPO: app-repo

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Deploy FastAPI
        run: |
          IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/fastapi:${{ github.event.workflow_run.head_sha }}
          gcloud run deploy fastapi \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated

      - name: Deploy Streamlit
        run: |
          IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/streamlit:${{ github.event.workflow_run.head_sha }}
          gcloud run deploy streamlit \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --set-env-vars API_URL=https://FASTAPI_URL \
            --allow-unauthenticated
